<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <style>rect { shape-rendering: crispEdges; }</style>
  <!-- Anvil top (face) -->
  <rect x="8" y="10" width="16" height="2" fill="#5a5a5a"/>
  <rect x="6" y="12" width="20" height="2" fill="#4a4a4a"/>
  <rect x="6" y="14" width="20" height="2" fill="#3a3a3a"/>
  <!-- Anvil body -->
  <rect x="4" y="16" width="24" height="2" fill="#3a3a3a"/>
  <rect x="8" y="18" width="16" height="2" fill="#3a3a3a"/>
  <rect x="10" y="20" width="12" height="2" fill="#3a3a3a"/>
  <rect x="12" y="22" width="8" height="2" fill="#3a3a3a"/>
  <rect x="14" y="24" width="4" height="2" fill="#3a3a3a"/>
  <!-- Flame core (orange) -->
  <rect x="14" y="4" width="4" height="2" fill="#ff9a44"/>
  <rect x="12" y="6" width="8" height="2" fill="#ff9a44"/>
  <rect x="14" y="8" width="4" height="2" fill="#f54e00"/>
  <rect x="12" y="10" width="8" height="2" fill="#f54e00" opacity="0.6"/>
  <!-- Flame outer -->
  <rect x="10" y="6" width="2" height="2" fill="#ff9a44"/>
  <rect x="20" y="6" width="2" height="2" fill="#ff9a44"/>
  <rect x="10" y="8" width="2" height="2" fill="#f54e00"/>
  <rect x="20" y="8" width="2" height="2" fill="#f54e00"/>
  <!-- Sparks (yellow) -->
  <rect x="8" y="4" width="2" height="2" fill="#ffc844"/>
  <rect x="22" y="4" width="2" height="2" fill="#ffc844"/>
  <rect x="6" y="8" width="2" height="2" fill="#ffc844" opacity="0.7"/>
  <rect x="24" y="8" width="2" height="2" fill="#ffc844" opacity="0.7"/>
  <rect x="10" y="2" width="2" height="2" fill="#ffc844" opacity="0.5"/>
  <rect x="20" y="2" width="2" height="2" fill="#ffc844" opacity="0.5"/>
</svg>
